services:
  - type: web
    name: invoicing-plus
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npx prisma migrate deploy && node server.js
    envVars:
      - key: QB_CLIENT_ID
        sync: false
      - key: QB_CLIENT_SECRET
        sync: false
      - key: QB_ENVIRONMENT
        value: sandbox
      - key: QB_REDIRECT_URI
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false

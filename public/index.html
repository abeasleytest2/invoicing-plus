<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Invoice App</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
      color: #1a1a1a;
      background: #fafafa;
    }
    h1 { margin-bottom: 8px; }
    .subtitle { color: #666; margin-top: 0; margin-bottom: 32px; }
    .card {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
    }
    .status.connected { background: #d4edda; color: #155724; }
    .status.disconnected { background: #f8d7da; color: #721c24; }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
      margin-top: 16px;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }
    button {
      background: #2ca01c;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 16px;
    }
    button:hover { background: #238016; }
    button.secondary { background: #0077c5; }
    button.secondary:hover { background: #005a96; }
    button.link-btn {
      background: transparent;
      color: #0077c5;
      padding: 4px 8px;
      margin: 0;
      font-size: 13px;
    }
    button.link-btn:hover { background: #f0f0f0; }
    .line-item {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 8px;
      margin-bottom: 8px;
      align-items: end;
    }
    .line-item label { margin-top: 0; font-size: 12px; }
    .line-item input { padding: 8px; }
    #message {
      padding: 12px;
      border-radius: 6px;
      margin-top: 16px;
      display: none;
    }
    #message.success { background: #d4edda; color: #155724; display: block; }
    #message.error { background: #f8d7da; color: #721c24; display: block; }
  </style>
</head>
<body>
  <h1>Claude Invoice App</h1>
  <p class="subtitle">Create invoices and send them to QuickBooks Online.</p>

  <div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <div>
        <strong>QuickBooks connection:</strong>
        <span id="connection-status" class="status disconnected">Checking...</span>
      </div>
      <a href="/connect"><button class="secondary" type="button">Connect to QuickBooks</button></a>
    </div>
  </div>

  <div class="card">
    <h2 style="margin-top: 0;">New Invoice</h2>
    <form id="invoice-form">
      <label for="customer">Customer</label>
      <select id="customer" required>
        <option value="">Connect QuickBooks to load customers...</option>
      </select>

      <label style="margin-top: 24px;">Line items</label>
      <div id="line-items"></div>
      <button type="button" class="link-btn" id="add-line">+ Add line</button>

      <button type="submit">Create Invoice in QuickBooks</button>
    </form>
    <div id="message"></div>
  </div>

  <script>
    const lineItemsEl = document.getElementById('line-items');
    const messageEl = document.getElementById('message');

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = type;
    }

    function addLine(description = '', qty = 1, amount = '') {
      const row = document.createElement('div');
      row.className = 'line-item';
      row.innerHTML = `
        <div>
          <label>Description</label>
          <input type="text" class="desc" value="${description}" required />
        </div>
        <div>
          <label>Qty</label>
          <input type="number" class="qty" value="${qty}" min="1" step="1" required />
        </div>
        <div>
          <label>Amount ($)</label>
          <input type="number" class="amount" value="${amount}" min="0" step="0.01" required />
        </div>
        <button type="button" class="link-btn remove-line">Remove</button>
      `;
      row.querySelector('.remove-line').addEventListener('click', () => row.remove());
      lineItemsEl.appendChild(row);
    }

    document.getElementById('add-line').addEventListener('click', () => addLine());
    addLine('', 1, '');

    async function checkStatus() {
      const res = await fetch('/status');
      const data = await res.json();
      const statusEl = document.getElementById('connection-status');
      if (data.connected) {
        statusEl.textContent = 'Connected (company ' + data.realmId + ')';
        statusEl.className = 'status connected';
        loadCustomers();
      } else {
        statusEl.textContent = 'Not connected';
        statusEl.className = 'status disconnected';
      }
    }

    async function loadCustomers() {
      const res = await fetch('/customers');
      const customers = await res.json();
      const select = document.getElementById('customer');
      if (!Array.isArray(customers)) {
        select.innerHTML = '<option value="">Error loading customers</option>';
        return;
      }
      select.innerHTML = '<option value="">Select a customer...</option>' +
        customers.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    }

    document.getElementById('invoice-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      showMessage('Creating invoice...', 'success');

      const customerId = document.getElementById('customer').value;
      const rows = lineItemsEl.querySelectorAll('.line-item');
      const lines = Array.from(rows).map(row => ({
        description: row.querySelector('.desc').value,
        qty: row.querySelector('.qty').value,
        amount: row.querySelector('.amount').value,
      }));

      const res = await fetch('/invoices', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ customerId, lines }),
      });
      const data = await res.json();

      if (data.success) {
        showMessage(`Invoice created! Doc #${data.docNumber} (ID: ${data.invoiceId})`, 'success');
      } else {
        showMessage('Error: ' + JSON.stringify(data.error), 'error');
      }
    });

    checkStatus();
  </script>
</body>
</html>
